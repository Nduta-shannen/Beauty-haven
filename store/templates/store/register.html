{% extends 'main.html' %}

{% block content %}

<div style="width:350px; margin:60px auto; padding:30px; background:white; border-radius:10px; box-shadow:0 0 10px lightgray;">

    <h2 style="text-align:center; color:#e91e63;">
        🌸 Create an Account
    </h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.non_field_errors }}

{% for field in form %}
    <p>
        {{ field.label_tag }}<br>
        {{ field }}
        <span style="color:red;">{{ field.errors }}</span>
    </p>
{% endfor %}

        <button type="submit"
        style="width:100%;
        background:#e91e63;
        color:white;
        padding:12px;
        border:none;
        border-radius:8px;">
            Register
        </button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

{% endblock %}
