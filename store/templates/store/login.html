{% extends 'main.html' %}

{% block content %}

<div style="width:350px; margin:60px auto; padding:30px; background:white; border-radius:10px; box-shadow:0 0 10px lightgray;">

    <h2 style="text-align:center; color:#e91e63;">
        🌸 Login to Beauty Haven
    </h2>
    {% if messages %}
    {% for message in messages %}
        <div style="background:#d4edda; color:#155724; padding:10px; margin-bottom:15px; border-radius:5px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
        style="width:100%;
        background:#e91e63;
        color:white;
        padding:12px;
        border:none;
        border-radius:8px;
        font-size:16px;">
            Login
        </button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>

</div>

{% endblock %}
